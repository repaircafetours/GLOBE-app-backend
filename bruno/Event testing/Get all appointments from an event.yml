info:
  name: Get all appointments from an event
  type: http
  seq: 7

http:
  method: GET
  url: http://localhost:8000/api/v1/events/1/appointments
  headers:
    - name: Accept
      value: application/json
    - name: Authorization
      value: Bearer {{bearerToken}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
