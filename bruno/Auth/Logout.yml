info:
  name: Logout
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/api/v1/auth/logout"
  headers:
    - name: Authorization
      value: Bearer {{bearerToken}}

script:
  res: |-
    bru.setVar("bearerToken", "");

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
