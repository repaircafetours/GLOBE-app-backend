info:
  name: Login admin
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/api/v1/auth/login"
  body:
    type: json
    data: |-
      {
        "login": "admin",
        "password": "password"
      }

runtime:
  scripts:
    - type: after-response
      code: |-
        console.log(res.body);
        bru.setVar("bearerToken", res.body.token);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
