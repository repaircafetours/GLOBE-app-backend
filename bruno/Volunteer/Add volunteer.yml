info:
  name: Add volunteer
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/api/v1/volunteers"
  body:
    type: json
    data: |-
      {
        "idHumHub": 1,
        "password": "password"
      }
  headers:
    - name: Authorization
      value: Bearer {{bearerToken}}
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
