info:
  name: Generate visitor token
  type: http
  seq: 5

http:
  method: POST
  url: "{{baseUrl}}/api/v1/visitors/token"
  headers:
    - name: Authorization
      value: Bearer {{bearerToken}}
  body:
    type: json
    data: |-
      {
        "email": "a@a.com"
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
